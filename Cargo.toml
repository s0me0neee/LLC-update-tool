[package]
name = "llc_update"
version = "0.1.0"
edition = "2024"

[dependencies]
dirs = "6.0.0"
log = "0.4"
env_logger = "0.11"
keyvalues-parser = "0.2.3"
serde = { version = "1.0.228", features = ["derive"] }
serde_json = "1.0.149"
octocrab = "0.49.7"
tokio = { version = "1.52.1", features = ["full"] }
url = "2.5.8"
inquire = "0.9.4"
reqwest = { version = "0.13.2", features = ["stream", "native-tls"] }
futures-util = "0.3.32"
rustls = { version = "0.23", features = ["ring"] }
sevenz-rust = "0.6"
zip = "8.5"
